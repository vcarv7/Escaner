name: escaner_1
description: "Escáner de solapines"
publish_to: 'none'
version: 0.3.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^7.0.1
  excel_community: ^1.0.9
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  provider: ^6.1.2
  audioplayers: ^6.0.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/logo.png"
